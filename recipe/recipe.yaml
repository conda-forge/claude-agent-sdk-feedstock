context:
  version: "0.2.120"

package:
  name: claude-agent-sdk
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/eb/7f/7b69aed292a4edecae132e4dbe6b6decb4e88ec142fc91d117b19058c9e0/claude_agent_sdk-${{ version }}.tar.gz
  sha256: e428552f79a76e0d85789369eeb58249b33f350200124e5fc86b24168bd00805

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . --ignore-installed --no-cache-dir --no-deps -vv
  number: 0

requirements:
  host:
    - hatchling
    - pip
    - python ${{ python_min }}.*
  run:
    - anyio >=4.0.0
    - mcp >=1.23.0,<2.0.0
    - python >=${{ python_min }}
    - typing_extensions >=4.0.0
    - sniffio >=1.0.0
tests:
  - python:
      imports:
        - claude_agent_sdk
      pip_check: true

  - script: |
      python -m pytest tests/ -v || true
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
        - pytest-asyncio >=0.20.0
        - trio
    files:
      source:
        - CHANGELOG.md
        - tests/

about:
  homepage: https://github.com/anthropics/claude-agent-sdk-python
  summary: Python SDK for Claude Agent.
  description: Python SDK for Claude Agent.
  license: MIT
  license_file: LICENSE
  documentation: https://platform.claude.com/docs/en/agent-sdk/python
  repository: https://github.com/anthropics/claude-agent-sdk-python

extra:
  recipe-maintainers:
    - jan-janssen
    - MementoRC
